<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>퀘스트 퍼피 키우기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div id="toast" class="toast">알림 메시지</div>

        <header class="puppy-section">
            <div class="status-bar">[<span id="equipped-title"></span>강아지, 레벨: <span id="level">1</span>, 행복 지수: <span id="happiness">0</span>]</div>
            
            <div id="puppy-container" class="puppy-container">
                <div id="puppy-box" class="puppy-box" onclick="tapPuppy()">
                    <img src="https://png.pngtree.com/png-vector/20230221/ourmid/pngtree-cute-dog-illustration-png-image_6612074.png" alt="강아지 사진" id="puppy-img">
                    <div id="puppy-speech" class="speech-bubble">멍멍!</div>
                </div>
                <div id="fever-badge" class="fever-badge">🔥 FEVER TIME (보상 폭증!)</div>
            </div>

            <div class="stats">
                <div class="stat-box">EXP: <span id="exp">0</span> / 100</div>
                <div class="stat-box">Gold: <span id="gold">0</span> 원</div>
            </div>
        </header>

        <main class="content">
            <section id="quest-tab" class="tab-content active">
                <div class="section-header">
                    <h2>오늘의 퀘스트</h2>
                    <button class="sudden-btn" id="sudden-btn" onclick="generateSuddenQuest()">⚡ 돌발 미션 받기</button>
                </div>
                <div class="input-group">
                    <input type="text" id="quest-input" placeholder="오늘 할 일을 적어주세요">
                    <button onclick="addQuest()">등록</button>
                </div>
                <ul id="quest-list"></ul>
            </section>

            <section id="shop-tab" class="tab-content">
                <h2>퍼피 상점</h2>
                <ul class="shop-list">
                    <li>
                        <div class="item-info">
                            <span class="item-name">빗</span>
                            <span class="item-desc">사진 배경색 변경 & 행복도 +13</span>
                        </div>
                        <span class="price">100원</span>
                        <button class="buy-btn" onclick="buyItem('빗', 100)">구매</button>
                    </li>
                    <li>
                        <div class="item-info">
                            <span class="item-name">간식</span>
                            <span class="item-desc">행복도 +33 & EXP +33</span>
                        </div>
                        <span class="price">100원</span>
                        <button class="buy-btn" onclick="buyItem('간식', 100)">구매</button>
                    </li>
                    <li>
                        <div class="item-info">
                            <span class="item-name">산책</span>
                            <span class="item-desc">행복도 +33</span>
                        </div>
                        <span class="price">100원</span>
                        <button class="buy-btn" onclick="buyItem('산책', 100)">구매</button>
                    </li>
                </ul>
            </section>

            <section id="inventory-tab" class="tab-content">
                <h2>내 가방</h2>
                <ul id="inventory-list" class="inventory-list"></ul>
                <button class="reset-btn" onclick="resetGame()">게임 초기화</button>
            </section>

            <section id="title-tab" class="tab-content">
                <h2>업적 및 칭호</h2>
                <div class="achievement-stats">
                    총 완료한 퀘스트: <span id="stat-total-quests">0</span>개
                </div>
                <ul id="title-list" class="title-list"></ul>
            </section>
        </main>

        <nav class="bottom-menu">
            <button class="tab-btn active" onclick="openTab('quest')">
                <span class="icon">📋</span><span>퀘스트</span>
            </button>
            <button class="tab-btn" onclick="openTab('shop')">
                <span class="icon">🛒</span><span>상점</span>
            </button>
            <button class="tab-btn" onclick="openTab('inventory')">
                <span class="icon">🎒</span><span>가방</span>
            </button>
            <button class="tab-btn" onclick="openTab('title')">
                <span class="icon">🏆</span><span>칭호</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
